# Netlify configuration — Laundromat 973
# This file tells Netlify where to find the dashboard and functions

[build]
  publish = "."
  functions = "netlify/functions"

# Redirect /api/fascard/* calls to the proxy function
[[redirects]]
  from = "/api/fascard"
  to = "/.netlify/functions/fascard"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
